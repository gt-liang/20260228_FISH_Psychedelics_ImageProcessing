# Puncta Anchor Validation Pipeline Configuration
# ================================================
# Uses Hyb4 as a calibration round:
#   1. Detect all puncta positions in Hyb4 (LoG on max-projection of 3 channels)
#   2. Cross-reference each position in Hyb3 + Hyb2 (signal in search_radius window)
#   3. Validate: peak_in_window / nucleus_p25_background > min_signal_normalized
#
# Biological rationale:
#   smFISH mRNA molecules are spatially fixed between rounds.
#   Only the probe color changes. A true signal must appear at the same (y, x)
#   in every round. Anchoring on Hyb4 eliminates noise from other positions.
#
# Confirmation logic (v2 — per-nucleus normalized threshold):
#   background = 25th percentile of all nucleus pixels (per channel, per round)
#   normalized_signal = max_in_search_window / background
#   confirmed = (normalized_signal >= min_signal_normalized[channel])
#   This removes cell-to-cell variation in baseline fluorescence.
#   A ratio of 2.0 means "this spot is 2× brighter than this cell's own background".

detection:
  min_sigma: 1.0        # LoG min scale (px) — lower bound of spot radius
  max_sigma: 4.0        # LoG max scale (px) — upper bound of spot radius
  log_threshold: 0.20   # Normalised LoG response threshold (0–1).
                        # Lower = more sensitive (more candidates).
                        # 0.02 was too sensitive (avg 24.5 blobs/nucleus — mostly noise).
                        # 0.10 gave avg 5.0 blobs/nucleus — still too many.
                        # 0.20 gave avg 1.54 blobs/nucleus — current calibrated value.

validation:
  search_radius: 3      # Pixel radius window around Hyb4 position to
                        # search for signal in Hyb3/Hyb2.
                        # Accounts for residual sub-pixel registration error.

  min_signal_normalized:
    # Normalized threshold: max_in_window / nucleus_p25_background > threshold
    # Per-channel because mCherry (Ch2_AF590) creates diffuse nuclear background
    # that systematically lowers SNR for that channel.
    #
    # Calibration basis (snr_summary.csv, n=1895 candidates, log_threshold=0.20):
    #   Ch1_AF647: p90=3.99, only bimodal channel — threshold 2.0 separates peaks
    #   Ch3_AF488: p90=4.49, similar distribution to Ch1
    #   Ch2_AF590: p90=1.88, mCherry diffuse bg — lower threshold 1.5
    Ch1_AF647: 2.0
    Ch2_AF590: 1.5
    Ch3_AF488: 2.0

  min_snr_ratio: 0.0    # LoG detection SNR filter (peak / local annulus bg).
                        # 0.0 = DISABLED. Use min_signal_normalized instead.

output:
  results_dir: "python_results/puncta_anchor"
  save_figures: true    # Export one QC PNG per nucleus
  figure_dpi: 100
